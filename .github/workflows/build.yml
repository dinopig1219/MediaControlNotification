name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.keystore

      - name: Verify keystore
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: keytool -list -keystore app/release.keystore -storepass "$KEYSTORE_PASSWORD"

      - name: Build debug + release APK
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleDebug assembleRelease

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: app/build/outputs/apk/debug/*.apk

      - uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app/build/outputs/apk/release/*.apk

  notify_telegram:
    name: Push to Telegram Channel
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: app-release-apk
          path: release-apk

      - name: Push release APK to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_AUTHOR: ${{ github.event.head_commit.author.username }}
          COMMIT_URL: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          APK_PATH=$(find release-apk -name "*.apk" | head -n1)

          RAW_MESSAGE="${COMMIT_MESSAGE:-Manual trigger}"
          AUTHOR="${COMMIT_AUTHOR:-${{ github.actor }}}"

          SAFE_MESSAGE=$(printf '%s' "$RAW_MESSAGE" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')

          CAPTION=$(printf 'New push to GitHub\n<b>Branch:</b>\n<code>%s</code>\n\n<b>Commits:</b>\n<code>%s</code>\n\nby %s\n\n<a href="%s">Commit</a>' \
            "$BRANCH_NAME" "$SAFE_MESSAGE" "$AUTHOR" "$COMMIT_URL")

          curl -F "chat_id=${TELEGRAM_CHAT_ID}" \
               -F "document=@${APK_PATH}" \
               -F "parse_mode=HTML" \
               -F "caption=${CAPTION}" \
               "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument"
